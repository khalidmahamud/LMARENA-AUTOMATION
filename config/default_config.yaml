# LM Arena Automation — Default Configuration

browser:
  window_count: 2
  window_size:
    width: 900
    height: 800
  headless: false
  incognito: false
  # proxies:
  #   - server: "http://proxy1.example.com:8080"
  #     username: "user1"
  #     password: "pass1"
  #   - server: "http://proxy2.example.com:8080"
  #   - server: "socks5://proxy3.example.com:1080"

display:
  monitor_count: 1
  monitor_width: 1920
  monitor_height: 1080
  taskbar_height: 40
  margin: 0
  border_offset: 7    # Windows invisible shadow (set 0 for Linux/macOS)

timing:
  submission_gap_seconds: 30.0
  jitter_pct: 0.30
  poll_interval_seconds: 2.0
  stable_polls_required: 3
  response_timeout_seconds: 300.0

typing:
  min_delay_ms: 50
  max_delay_ms: 150

distributed:
  enabled: true
  coordinator_port: 8001
  auth_token: "IykpflrTW0CVmwojJehwH2WPPgYeHKJL8cJQ43rEbgA"    # change this
  scheduling_policy: "fill"           # "fill" (pack nodes) or "spread" (round-robin)
  heartbeat_interval_seconds: 5
  heartbeat_timeout_missed: 3         # 3 missed = 15s before node declared dead
  reconnect_grace_seconds: 30
  event_coalesce_ms: 100
  allow_local_workers: false          # true = also run browsers on coordinator


arena_url: "https://arena.ai/text/side-by-side"
output_dir: "outputs"
log_level: "INFO"
