# LM Arena DOM Selectors — Side-by-Side Mode
# Based on live site inspection of https://arena.ai/text/side-by-side

prompt_textarea: "form textarea[name='message'], div.tiptap[contenteditable='true'], div.ProseMirror[contenteditable='true'], div[contenteditable='true'][role='textbox'], textarea[placeholder*='Ask anything'], textarea[placeholder*='Send a message'], textarea[placeholder*='Type your message']"
submit_button: "form button[type='submit']:has(svg), form button[type='submit'], button[data-testid='send-button'], button[aria-label='Send']"

# Model pickers — side-by-side has two model dropdown buttons
model_dropdown: "button[aria-haspopup='dialog']"
side_by_side_button: "button[role='combobox']:has-text('Side by Side')"
model_search_input: "input[cmdk-input], input[placeholder='Search models'], input[placeholder*='Search model']"
model_option: "[cmdk-item][role='option'], [cmdk-item], [role='option'][data-value], button[type='button']:has(span.font-mono)"

# Two response panels (side-by-side produces one prose response inside each slide)
response_panel: "[role='group'][aria-roledescription='slide'] .prose"
response_slide: "[role='group'][aria-roledescription='slide']"

# Copy buttons per response (index 0 = Model A, index 1 = Model B)
copy_button: "button[data-slot='tooltip-trigger']"

# Model name display (both model buttons have span.truncate)
model_name_label: "button[aria-haspopup='dialog'][class*='max-w-'] span.truncate.text-left"

# Terms of Use / cookie dialogs
tos_agree_button: "[role='dialog'] button[type='submit']"
cookie_accept_button: "[role='dialog'] button:has-text('Accept Cookies'), [role='dialog'] button:has-text('Accept All Cookies'), button:has-text('Accept Cookies'), button:has-text('Accept All Cookies'), [role='button']:has-text('Accept Cookies'), [role='button']:has-text('Accept All Cookies')"
voting_onboarding_got_it_button: "[role='dialog'] button:has-text('Got it')"

# Login dialog (dismiss by clicking the X — it's a direct child of the dialog)
login_dialog_close: "[role='dialog'] > button"

# Challenge detection
challenge:
  turnstile_iframe: "iframe[src*='challenges.cloudflare.com']"
  turnstile_container: "#cf-turnstile"
  recaptcha_iframe: "iframe[src*='google.com/recaptcha']"

# Streaming indicators
streaming_indicator: ".streaming, [data-streaming='true'], .animate-pulse"
stop_generation_button: "button[aria-label='Stop generation']"
