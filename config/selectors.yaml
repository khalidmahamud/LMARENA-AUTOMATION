# LM Arena DOM Selectors — centralized, easy to update when Arena changes UI
# NOTE: These are initial placeholders. Must be refined by inspecting the live site.

prompt_textarea: "textarea[placeholder*='Send a message'], textarea[placeholder*='Type your message']"
submit_button: "button[data-testid='send-button'], button[aria-label='Send'], form button[type='submit']"

model_dropdown:
  left: ".model-picker:first-child button, [data-testid='model-selector-left']"
  right: ".model-picker:last-child button, [data-testid='model-selector-right']"

model_search_input: "input[placeholder*='Search'], input[placeholder*='search']"
model_option: "[role='option'], [data-testid='model-option']"

response_panel:
  left: "[data-testid='response-left'], .chat-message:nth-child(1) .markdown-content"
  right: "[data-testid='response-right'], .chat-message:nth-child(2) .markdown-content"

model_name_label:
  left: "[data-testid='model-name-left']"
  right: "[data-testid='model-name-right']"

# Challenge detection
challenge:
  turnstile_iframe: "iframe[src*='challenges.cloudflare.com']"
  turnstile_container: "#cf-turnstile"
  recaptcha_iframe: "iframe[src*='google.com/recaptcha']"
  login_button: "button:has-text('Sign in'), a:has-text('Log in')"

# Streaming indicators
streaming_indicator: ".streaming, [data-streaming='true'], .animate-pulse"
