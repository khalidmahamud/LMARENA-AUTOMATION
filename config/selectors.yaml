# LM Arena DOM Selectors — Direct Mode
# Based on live site inspection of https://arena.ai/text/direct

prompt_textarea: "textarea[placeholder*='Ask anything'], textarea[placeholder*='Send a message'], textarea[placeholder*='Type your message']"
submit_button: "button[data-testid='send-button'], button[aria-label='Send'], form button[type='submit']"

# Single model picker — the model button contains a span.truncate with the model name
model_dropdown: "button[aria-haspopup='dialog']:has(span.truncate)"
model_search_input: "input[cmdk-input]"
model_option: "[cmdk-item][role='option']"

# Single response panel (direct mode produces one response)
response_panel: ".chat-message .markdown-content, [data-testid='response-panel']"

# Model name display (read from the dropdown button span after selection)
model_name_label: "button[aria-haspopup='dialog'] span.truncate"

# Terms of Use dialog
tos_dialog: "[role='dialog']"
tos_agree_button: "[role='dialog'] button[type='submit']"

# Login dialog (dismiss by clicking the X — it's a direct child of the dialog)
login_dialog_close: "[role='dialog'] > button"

# Challenge detection
challenge:
  turnstile_iframe: "iframe[src*='challenges.cloudflare.com']"
  turnstile_container: "#cf-turnstile"
  recaptcha_iframe: "iframe[src*='google.com/recaptcha']"

# Streaming indicators
streaming_indicator: ".streaming, [data-streaming='true'], .animate-pulse"
